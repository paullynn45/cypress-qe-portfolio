name: Cypress E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          # NODE_OPTIONS is scoped to the start command only — npm itself rejects
          # --openssl-legacy-provider, so a job-level env: would break npm ci.
          # The flag is only needed for react-scripts 3.x (webpack 4 + OpenSSL 3).
          start: 'NODE_OPTIONS=--openssl-legacy-provider npm start'
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
          browser: chrome

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
