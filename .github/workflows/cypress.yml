name: Cypress E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Cypress run
        uses: cypress-io/github-action@v6
        env:
          # Test credentials are injected here to demonstrate the standard CI
          # pattern. In a real app these would come from GitHub Actions secrets:
          #   CYPRESS_TEST_USER: ${{ secrets.TEST_USER }}
          #   CYPRESS_TEST_PASS: ${{ secrets.TEST_PASS }}
          # The app under test here validates client-side against a hard-coded
          # pair, so there's no meaningful secret to protect — the values are
          # shown literally to keep the pipeline self-contained.
          CYPRESS_TEST_USER: l.jenkins
          CYPRESS_TEST_PASS: hunter2
        with:
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
          browser: chrome

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
